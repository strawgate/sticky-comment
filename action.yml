name: Sticky PR Comment
description: One sticky PR comment with sections updatable by multiple jobs. Status badges, collapsible details.

branding:
  icon: message-square
  color: blue

inputs:
  token:
    description: GitHub token for API access
    default: ${{ github.token }}
  mode:
    description: "'init' to create/configure, 'update' to upsert a section, 'delete' to remove a section or comment"
    default: update
  comment-id:
    description: Logical name for the sticky comment (allows multiple per PR)
    default: sticky-comment
  issue-number:
    description: PR or issue number (auto-detected from event context if omitted)
    required: false

  # Comment-level config (init mode, or defaults on auto-create)
  header:
    description: Markdown heading shown at the top of the comment
    default: ""
  style:
    description: "Rendering style: 'summary' (collapsed details), 'full' (expanded), 'status-only' (table only)"
    default: summary

  # Section-level (update mode)
  section:
    description: Section identifier (required for update mode)
    required: false
  title:
    description: Display title for the section (defaults to section id)
    required: false
  status:
    description: "Section status: success, failure, pending, warning, skipped, cancelled, info"
    default: ""
  body:
    description: Section body content (markdown)
    default: ""
  body-path:
    description: Read section body from this file instead of body input
    required: false

outputs:
  comment-id:
    description: Numeric GitHub comment ID
  comment-url:
    description: HTML URL of the comment

runs:
  using: node24
  main: dist/index.js

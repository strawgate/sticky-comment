name: Check dist/

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    name: Verify dist/ is up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run package

      - name: Compare dist/
        run: |
          if [ "$(git diff --ignore-space-at-eol dist/ | wc -l)" -gt "0" ]; then
            echo "::error::dist/ is out of date. Run 'npm run build && npm run package' and commit the result."
            git diff --stat dist/
            exit 1
          fi
          echo "dist/ is up to date."
